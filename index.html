<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotRix Arena — Twitch Channel Points</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0e1a 0%, #12162c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .app-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(15, 20, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        .login-wall {
            background: rgba(8, 12, 25, 0.95);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(145, 180, 255, 0.3);
        }

        .twitch-btn {
            background: #9146ff;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 1.2rem;
        }

        .dashboard {
            display: none;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem 1.8rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #9146ff;
        }

        .username {
            font-size: 1.4rem;
            font-weight: bold;
            color: #f0f3ff;
        }

        .points-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            border-left: 4px solid #9146ff;
        }

        .points-label {
            font-size: 0.9rem;
            color: #cddcff;
        }

        .points-value {
            font-size: 2rem;
            font-weight: 800;
            color: #ffd966;
        }

        .logout-btn {
            background: rgba(255, 70, 85, 0.2);
            border: 1px solid #ff5e7a;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #ffb3be;
            cursor: pointer;
        }

        .pools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .pool-card {
            background: rgba(25, 32, 55, 0.8);
            border-radius: 1.8rem;
            padding: 1.5rem;
            border: 1px solid rgba(145, 180, 255, 0.25);
        }

        .pool-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .pool-cost {
            background: #1e293b;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: #ffd966;
            margin: 0.5rem 0;
        }

        .enter-btn {
            width: 100%;
            background: #2d3748;
            border: none;
            padding: 0.75rem;
            border-radius: 2rem;
            margin-top: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        .enter-btn:enabled {
            background: #9146ff;
            color: white;
        }

        .enter-btn:enabled:hover {
            background: #a259ff;
        }

        .enter-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-area {
            margin-top: 2rem;
            background: #0b0f1c;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            color: #bfcbff;
            border-left: 4px solid #9146ff;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 2rem;
        }

        .twitch-badge {
            display: inline-block;
            background: #9146ff20;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
            color: #b9c3ff;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loginWall" class="login-wall">
        <div style="font-size: 3rem;">🎮</div>
        <h2 style="color: white;">BotRix Arena</h2>
        <p style="color: #b9c3ff;">Connect to spend your REAL Twitch Channel Points on exclusive pools!</p>
        <button id="twitchLoginBtn" class="twitch-btn">🔐 LOGIN WITH TWITCH</button>
        <div id="loginMessage" class="login-status" style="margin-top: 1rem;"></div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="user-header">
            <div class="user-info">
                <img id="userAvatar" class="avatar" src="">
                <div>
                    <div class="username" id="userDisplayName"></div>
                    <div style="font-size: 0.75rem; color:#8f9bb5;">
                        <span id="userLogin"></span>
                        <span class="twitch-badge">✨ Twitch Channel Points</span>
                    </div>
                </div>
            </div>
            <div class="points-card">
                <span class="points-label">🎲 TWITCH CHANNEL POINTS</span>
                <span class="points-value" id="pointsAmount">0</span>
            </div>
            <button id="logoutBtn" class="logout-btn">🚪 Disconnect</button>
        </div>

        <h2 style="color: white; margin: 1rem 0;">🎯 ACTIVE POOLS</h2>
        <div id="poolsContainer" class="pools-grid">
            <div class="loading">Loading pools...</div>
        </div>
        <div id="notificationMessage" class="message-area">
            💡 Welcome! Your REAL Twitch channel points will be used to join pools.
        </div>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const API_BASE_URL = "https://botrix-api.onrender.com";
    const TWITCH_CLIENT_ID = "dxswtl8r959ihaqh4p17vpjmb19nos";
    const REDIRECT_URI = "https://yosuketv.github.io/YosukeTV/";
    
    // Required scopes for channel points
    const TWITCH_SCOPES = [
        'user:read:email',
        'channel:read:redemptions',
        'channel:manage:redemptions'
    ].join(' ');
    
    const AVAILABLE_POOLS = [
        { id: "pool_valo", name: "🔫 VALORANT SKINS POOL", description: "Win a premium skin bundle", cost: 250 },
        { id: "pool_emote", name: "😎 EMOTE JACKPOT", description: "Custom animated emote", cost: 120 },
        { id: "pool_gift", name: "🎁 10x GIFTED SUBS", description: "10 Tier 1 gift subs", cost: 400 },
        { id: "pool_arcane", name: "⚡ BOTRIX MYSTERY BOX", description: "Random surprise", cost: 80 }
    ];
    
    let currentUser = null;
    let accessToken = null;
    
    // ============ API FUNCTIONS ============
    
    async function getUserPointsFromTwitch() {
        if (!accessToken) return null;
        
        try {
            // Get the user's channel points balance from Twitch
            // First, get the user's broadcaster ID (they are the broadcaster for their own points)
            const userResponse = await fetch('https://api.twitch.tv/helix/users', {
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Client-Id': TWITCH_CLIENT_ID
                }
            });
            const userData = await userResponse.json();
            const broadcasterId = userData.data[0].id;
            
            // Get channel points custom rewards (this gives us the points balance)
            // Note: The actual points balance requires the 'channel:read:redemptions' scope
            const pointsResponse = await fetch(`https://api.twitch.tv/helix/channel_points/custom_rewards?broadcaster_id=${broadcasterId}`, {
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Client-Id': TWITCH_CLIENT_ID
                }
            });
            
            if (!pointsResponse.ok) {
                console.error('Failed to fetch points:', pointsResponse.status);
                return null;
            }
            
            const pointsData = await pointsResponse.json();
            
            // The API doesn't directly give the total points balance.
            // We need to track points spent in our database.
            // Alternative approach: Create a custom reward and track redemptions.
            
            // For now, we'll use our database to track points since Twitch doesn't expose the balance directly
            // Let's fetch from our backend
            const dbResponse = await fetch(`${API_BASE_URL}/api/twitch-points/${broadcasterId}`);
            const dbData = await dbResponse.json();
            return dbData.points || 0;
            
        } catch (error) {
            console.error('Error fetching Twitch points:', error);
            return null;
        }
    }
    
    async function spendTwitchPoints(twitchId, poolId, poolName, cost, accessToken) {
        try {
            const response = await fetch(`${API_BASE_URL}/api/spend-points`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    twitchId, 
                    poolId, 
                    poolName, 
                    cost,
                    accessToken 
                })
            });
            return await response.json();
        } catch (error) {
            console.error("Error spending points:", error);
            return { success: false, message: "Network error" };
        }
    }
    
    async function getUserEntriesAPI(twitchId) {
        try {
            const response = await fetch(`${API_BASE_URL}/api/entries/${twitchId}`);
            const data = await response.json();
            return data.entries || [];
        } catch (error) {
            console.error("Error fetching entries:", error);
            return [];
        }
    }
    
    // ============ TWITCH AUTH ============
    
    function getTwitchTokenFromUrl() {
        if (window.location.hash) {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            return hashParams.get('access_token');
        }
        return null;
    }
    
    async function fetchTwitchUser(token) {
        const response = await fetch('https://api.twitch.tv/helix/users', {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Client-Id': TWITCH_CLIENT_ID
            }
        });
        const data = await response.json();
        return data.data[0];
    }
    
    // ============ UI FUNCTIONS ============
    
    async function updateDashboard() {
        if (!currentUser || !accessToken) return;
        
        document.getElementById('poolsContainer').innerHTML = '<div class="loading">📡 Fetching your Twitch channel points...</div>';
        
        const points = await getUserPointsFromTwitch();
        
        if (points !== null) {
            document.getElementById('pointsAmount').innerText = points;
            const entries = await getUserEntriesAPI(currentUser.id);
            const enteredPoolIds = entries.map(e => e.poolId);
            renderPools(points, enteredPoolIds);
        } else {
            document.getElementById('poolsContainer').innerHTML = '<div class="loading">⚠️ Could not fetch Twitch points. Make sure you\'re the broadcaster or have proper permissions.</div>';
        }
    }
    
    function renderPools(currentPoints, enteredPoolIds) {
        const container = document.getElementById('poolsContainer');
        container.innerHTML = '';
        
        for (let pool of AVAILABLE_POOLS) {
            const alreadyEntered = enteredPoolIds.includes(pool.id);
            const canJoin = (!alreadyEntered && currentPoints >= pool.cost);
            
            const card = document.createElement('div');
            card.className = 'pool-card';
            card.innerHTML = `
                <div class="pool-name">${pool.name}</div>
                <div style="color: #a9b6e0; font-size: 0.85rem;">${pool.description}</div>
                <div class="pool-cost">💰 ${pool.cost} Channel Points</div>
                <div style="font-size: 0.8rem; margin: 0.5rem 0;">
                    ${alreadyEntered ? '✅ Already entered' : '⚡ Not entered yet'}
                </div>
                <button class="enter-btn" data-pool-id="${pool.id}" data-cost="${pool.cost}" ${!canJoin ? 'disabled' : ''}>
                    ${alreadyEntered ? 'ALREADY JOINED' : (canJoin ? `SPEND ${pool.cost} CHANNEL POINTS` : 'NOT ENOUGH POINTS')}
                </button>
            `;
            container.appendChild(card);
        }
        
        document.querySelectorAll('.enter-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (!currentUser || !accessToken) return;
                
                const poolId = btn.dataset.poolId;
                const cost = parseInt(btn.dataset.cost);
                const pool = AVAILABLE_POOLS.find(p => p.id === poolId);
                
                const msgDiv = document.getElementById('notificationMessage');
                msgDiv.innerHTML = '⏳ Creating Twitch redemption...';
                btn.disabled = true;
                
                const result = await spendTwitchPoints(currentUser.id, poolId, pool.name, cost, accessToken);
                
                if (result.success) {
                    msgDiv.innerHTML = `🎉 ${result.message}`;
                    await updateDashboard();
                } else {
                    msgDiv.innerHTML = `⚠️ ${result.message}`;
                    btn.disabled = false;
                }
                
                setTimeout(() => {
                    if (msgDiv.innerHTML.includes(result.message)) {
                        msgDiv.innerHTML = '💡 Spend your Twitch Channel Points on exclusive pools!';
                    }
                }, 5000);
            });
        });
    }
    
    async function onLoginSuccess(user, token) {
        currentUser = user;
        accessToken = token;
        
        document.getElementById('loginWall').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        document.getElementById('userDisplayName').innerText = user.display_name;
        document.getElementById('userLogin').innerText = `@${user.login}`;
        document.getElementById('userAvatar').src = user.profile_image_url;
        
        await updateDashboard();
    }
    
    function logout() {
        currentUser = null;
        accessToken = null;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('loginWall').style.display = 'block';
        window.location.hash = '';
    }
    
    async function init() {
        const token = getTwitchTokenFromUrl();
        
        if (token) {
            try {
                const userData = await fetchTwitchUser(token);
                await onLoginSuccess({
                    id: userData.id,
                    login: userData.login,
                    display_name: userData.display_name,
                    profile_image_url: userData.profile_image_url
                }, token);
                window.history.replaceState(null, '', window.location.pathname);
            } catch (err) {
                document.getElementById('loginMessage').innerHTML = '❌ Login failed. Try again.';
            }
        }
        
        document.getElementById('twitchLoginBtn').onclick = () => {
            const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${TWITCH_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(TWITCH_SCOPES)}`;
            window.location.href = authUrl;
        };
        
        document.getElementById('logoutBtn').onclick = logout;
    }
    
    init();
</script>
</body>
</html>
